messages:
  main:
    menu: |
      🤖 <b>Track provider status</b> –  
      telemetry, alerts, and much more.<br><br>

      📘 <b>How to find a provider:</b><br>
      • Open «All providers»<br>
      • Or tap «Find provider»<br>
      • Or send the public key in the chat<br>

    search_provider: |
      🔎 <b>Provider search</b><br><br>
      Send the provider’s public key in the chat:

    not_found: |
      ⚠️ <b>Provider not found</b><br><br>
      Make sure you sent the correct public key.

    invalid_input: |
      ❗️ <b>Invalid public key format</b><br><br>
      Please check your input and try again.

  stats:
    menu: |
      📊 <b>Bot Statistics</b><br><br>
      👥 <b>Users</b><br>
      • Total: <code>{{ stats.users_total }}</code><br>
      • Active: <code>{{ stats.users_active }}</code><br>
      • Inactive: <code>{{ stats.users_inactive }}</code><br><br>

      🗂 <b>Providers</b><br>
      • Total: <code>{{ stats.providers_total }}</code><br>
      • With telemetry: <code>{{ stats.providers_with_telemetry }}</code><br>
      • With password set: <code>{{ stats.providers_with_password }}</code><br><br>

      🧩 <b>Storage git hash versions</b><br>
      {% for h, c in stats.storage_git_hashes|dictsort(by='value', reverse=True) %}
      • <code>{{ h }}</code> — providers: <code>{{ c }}</code><br>
      {% endfor %}<br>

      🧩 <b>Provider git hash versions</b><br>
      {% for h, c in stats.provider_git_hashes|dictsort(by='value', reverse=True) %}
      • <code>{{ h }}</code> — providers: <code>{{ c }}</code><br>
      {% endfor %}

  alert_settings:
    types_menu: |
      📢 <b>Select notification types</b><br><br>
      Choose which events you want to receive alerts about.

    thresholds_menu: |
      ⚙️ <b>Notification trigger thresholds</b><br><br>
      Set the threshold values at which alerts will be sent.

    edit_threshold:
      title: |
        ⚙️ <b>Threshold: {{ threshold_name }}</b><br><br>
      hint: |
        Current value: <b>{{ threshold_value }}%</b><br>
        Set the desired threshold using the buttons below.

  language:
    menu: |
      🌐 <b>Select language</b><br><br>
      Choose the interface language that’s most convenient for you.

  help:
    menu: |
      ℹ️ <b>About the bot</b><br><br>
      This bot helps track provider status,
      receive alerts, and manage subscriptions.

  provider:
    menu: |
      {{ provider.ui.status_emoji }} <b>Provider</b> <code>{{ provider.ui.short_pubkey }}</code><br><br>
      <b>• Status</b>: <code>{{ provider.ui.status_text }} ({{ provider.ui.uptime }})</code><br>
      <b>• Rating</b>: <code>{{ provider.ui.rating }}</code><br>
      <b>• Price</b>: <code>{{ provider.ui.price }}</code><br>
      <b>• Address</b>: <a href="https://tonviewer.com/{{ provider.address }}">{{ provider.ui.short_address }}</a><br>
      <b>• In operation</b>: <code>{{ provider.working_time | durationformat }}</code><br>
      <b>• Location</b>: <code>{{ provider.ui.location }}</code><br>
      <b>• Storage Git hash:</b> <code>{{ provider.ui.storage_git_hash }}</code><br>
      <b>• Provider Git hash:</b> <code>{{ provider.ui.provider_git_hash }}</code><br>
      <b>• Registration date:</b> <code>{{ provider.reg_time | datetimeformat }}</code><br>

    enter_password: |
      🔐 <b>Enter password</b><br><br>
      To subscribe to the provider, please send the password.<br><br>
      <blockquote>
      You can set the password in the mytonprovider console using the command:<br>
      <code>telemetry_pass &lt;password&gt;</code>
      </blockquote>

    incorrect_password: |
      ❗️ <b>Incorrect password</b><br><br>
      Check your input and try again:

    password_invalid: |
      <h3>⚠️ Password changed</h3>
      Access to extended data is restricted. Update your password to restore access.

    wallet: |
      <h2>Wallet</h2>
      <blockquote>
      <b>• Balance:</b> <code>{{ provider_wallet_metrics.get('balance') | toamount }} TON</code><br>
      <b>• Earned today:</b> <code>{{ provider_wallet_metrics.get('earned_today') | toamount }} TON</code><br>
      <b>• Earned in last 7 days:</b> <code>{{ provider_wallet_metrics.get('earned_week') | toamount }} TON</code><br>
      <b>• Earned in last 30 days:</b> <code>{{ provider_wallet_metrics.get('earned_month') | toamount }} TON</code><br>
      <b>• Total earned:</b> <code>{{ provider_wallet_metrics.get('earned_total') | toamount }} TON</code><br>
      <b>• Updated:</b> <code>{{ provider_wallet_metrics.get('updated_at') | datetimeformat }}</code><br>
      </blockquote>

    storage: |
      <h2>Storage</h2>
      <blockquote>
      <b>• Max bag size:</b> <code>{{ provider.ui.max_bag_size }}</code><br>
      <b>• Max retention period:</b> <code>{{ provider.max_span | durationformat }}</code><br>
      <b>• Min retention period:</b> <code>{{ provider.min_span | durationformat }}</code><br>
      <b>• Space usage:</b><br>
      {% set m = provider_storage_metrics %}
      {% set rows = [
        ("Today", "used_today"),
        ("Last 7 days", "used_week"),
        ("Last 30 days", "used_month"),
        ("Total", "used_total"),
      ] %}
      <b>&nbsp;&nbsp;Format: (used / occupied / total)</b><br>
      {% for label, k in rows -%}
        {% set used_delta_bytes = ((m.get(k) or 0.0) * 1_000_000_000) %}
        {% set used_eom_bytes = ((m.get('used_provider_space') or 0.0) * 1_000_000_000) %}
        {% set total_eom_bytes = ((m.get('total_provider_space') or 0.0) * 1_000_000_000) %}
        <b>&nbsp;&nbsp;&nbsp;• {{ label }}:</b>
        <code>{{ used_delta_bytes | sizeformat }}</code>
        / <code>{{ used_eom_bytes | sizeformat }}</code>
        / <code>{{ total_eom_bytes | sizeformat }}</code><br>
      {%- endfor %}
      <b>&nbsp;&nbsp;&nbsp;• Updated:</b> <code>{{ m.get('updated_at') | datetimeformat }}</code><br>
      </blockquote>

    hardware: |
      <h2>Hardware</h2>
      <blockquote>
      <b>• CPU:</b> <code>{{ provider.ui.cpu_name }}</code><br>
      <b>• Number of cores:</b> <code>{{ provider.ui.cpu_number }}</code><br>
      <b>• Virtual CPU:</b> <code>{{ provider.ui.cpu_is_virtual }}</code><br>
      <b>• RAM:</b> <code>{{ provider.ui.ram }}</code><br>
      <b>• Storage capacity:</b> <code>{{ provider.ui.storage }}</code><br>
      </blockquote>

    benchmarks: |
      <h2>Benchmarks</h2>
      <blockquote>
      <b>• Disk read speed:</b> <code>{{ provider.ui.disk_read_speed }}</code><br>
      <b>• Disk write speed:</b> <code>{{ provider.ui.disk_write_speed }}</code><br>
      </blockquote>

    network: |
      <h2>Network</h2>
      <blockquote>
      <b>• Download speed:</b> <code>{{ provider.ui.speed_download }}</code><br>
      <b>• Upload speed:</b> <code>{{ provider.ui.speed_upload }}</code><br>
      <b>• Ping:</b> <code>{{ provider.ui.ping }}</code><br>
      <b>• Country:</b> <code>{{ provider.ui.country }}</code><br>
      <b>• ISP:</b> <code>{{ provider.ui.isp }}</code><br>
      </blockquote>

    traffic: |
      <h2>Traffic</h2>
      {% set m = provider_traffic_metrics %}
      {% set rows = [
        ("Today", "traffic_today_in","traffic_today_out","traffic_today_total"),
        ("Last 7 days", "traffic_week_in","traffic_week_out","traffic_week_total"),
        ("Last 30 days", "traffic_month_in","traffic_month_out","traffic_month_total"),
        ("Total", "traffic_total_in","traffic_total_out","traffic_total"),
      ] %}
      <blockquote>
      <b>Format: (in / out / total)</b><br>
      {% for label, i, o, t in rows -%}
        {% set total = (m.get(t) if t else ((m.get(i) or 0) + (m.get(o) or 0))) %}
        <b>• {{ label }}:</b>
        <code>{{ (m.get(i) or 0) | sizeformat }}</code> / <code>{{ (m.get(o) or 0) | sizeformat }}</code> / <code>{{ total | sizeformat }}</code><br>
      {%- endfor %}
      <b>• Updated:</b> <code>{{ m.get('updated_at') | datetimeformat }}</code><br>
      </blockquote>

    last_month_report: |
      <h2>Last Month Report</h2>
      <blockquote>
      <b>• Earned:</b> <code>+{{ provider_last_month_report.earned_nanoton | toamount }} TON</code><br>
      <b>• Storage Used:</b> <code>+{{ provider_last_month_report.used_space_bytes | sizeformat }}</code><br>
      <b>• Traffic Used:</b> <code>↓ {{ provider_last_month_report.traffic_in_bytes | sizeformat }}</code> / <code>↑ {{ provider_last_month_report.traffic_out_bytes | sizeformat }}</code><br>
      <b>• Period:</b> <code>{{ provider_last_month_report.start_date }}</code> • <code>{{ provider_last_month_report.end_date }}</code><br><br>
      </blockquote>

alerts:
  monthly_report:
    info: |
      📊 <b>Monthly Report</b><br><br>
      <b>Provider:</b> <code>{{ provider.ui.short_pubkey }}</code><br>
      <b>Period:</b> <code>{{ report.start_date }}</code> • <code>{{ report.end_date }}</code><br><br>
      
      <b>• Earned:</b> <code>+{{ report.earned_nanoton | toamount }} TON</code><br>
      <b>• Storage used:</b> <code>+{{ report.used_space_bytes | sizeformat }}</code><br>
      <b>• Traffic used:</b> <code>↓ {{ report.traffic_in_bytes | sizeformat }}</code> / <code>↑ {{ report.traffic_out_bytes | sizeformat }}</code><br>

  service_restarted:
    detected: |
      ⚠️️ <b>Service {{ service_name }} has restarted</b><br><br>
      <b>Provider</b>: <code>{{ provider.ui.short_pubkey }}</code><br>

  cpu_high:
    detected: |
      ❗️ <b>CPU | High load detected</b><br><br>
      <b>Provider</b>: <code>{{ provider.ui.short_pubkey }}</code><br>
    resolved: |
      🔰 <b>CPU | Load normalized</b><br><br>
      <b>Provider</b>: <code>{{ provider.ui.short_pubkey }}</code><br>

  ram_high:
    detected: |
      ❗️ <b>RAM | High load detected</b><br><br>
      <b>Provider</b>: <code>{{ provider.ui.short_pubkey }}</code><br>
    resolved: |
      🔰 <b>RAM | Load normalized</b><br><br>
      <b>Provider</b>: <code>{{ provider.ui.short_pubkey }}</code><br>

  disk_load_high:
    detected: |
      ❗️ <b>Disk | High load detected</b><br><br>
      <b>Provider</b>: <code>{{ provider.ui.short_pubkey }}</code><br>
    resolved: |
      🔰 <b>Disk | Load normalized</b><br><br>
      <b>Provider</b>: <code>{{ provider.ui.short_pubkey }}</code><br>

  network_high:
    detected: |
      ❗️ <b>Network | High load detected</b><br><br>
      <b>Provider</b>: <code>{{ provider.ui.short_pubkey }}</code><br>
    resolved: |
      🔰 <b>Network | Load normalized</b><br><br>
      <b>Provider</b>: <code>{{ provider.ui.short_pubkey }}</code><br>

  disk_space_low:
    detected: |
      ❗️ <b>Disk | Low available space</b><br><br>
      <b>Provider</b>: <code>{{ provider.ui.short_pubkey }}</code><br>
    resolved: |
      🔰 <b>Disk | Available space restored</b><br><br>
      <b>Provider</b>: <code>{{ provider.ui.short_pubkey }}</code><br>

  provider_offline:
    detected: |
      ❗️ <b>Provider server is not responding</b><br><br>
      <b>Provider</b>: <code>{{ provider.ui.short_pubkey }}</code><br>
    resolved: |
      🔰 <b>Provider server is back online</b><br><br>
      <b>Provider</b>: <code>{{ provider.ui.short_pubkey }}</code><br>

