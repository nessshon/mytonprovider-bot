messages:
  main:
    menu: |
      🤖 <b>Отслеживайте статус провайдеров</b> –  
      телеметрия, уведомления и многое другое.<br><br>

      📘 <b>Как найти провайдера:</b><br>
      • Откройте «Все провайдеры»<br>
      • Или нажмите «Найти провайдера»<br>
      • Или отправьте публичный ключ в чат<br>

    search_provider: |
      🔎 <b>Поиск провайдера</b><br><br>
      Отправьте публичный ключ провайдера в чат:

    not_found: |
      ⚠️ <b>Провайдер не найден</b><br><br>
      Убедитесь, что вы отправили корректный публичный ключ.

    invalid_input: |
      ❗️ <b>Неверный формат публичного ключа</b><br><br>
      Пожалуйста, проверьте ввод и попробуйте снова.

  stats:
    menu: |
      📊 <b>Статистика бота</b><br><br>
      👥 <b>Пользователи</b><br>
      • Всего: <code>{{ stats.users_total }}</code><br>
      • Активные: <code>{{ stats.users_active }}</code><br>
      • Неактивные: <code>{{ stats.users_inactive }}</code><br><br>

      🗂 <b>Провайдеры</b><br>
      • Всего: <code>{{ stats.providers_total }}</code><br>
      • С телеметрией: <code>{{ stats.providers_with_telemetry }}</code><br>
      • С установленным паролем: <code>{{ stats.providers_with_password }}</code><br><br>

      🧩 <b>Версии storage git hash</b><br>
      {% for h, c in stats.storage_git_hashes|dictsort(by='value', reverse=True) %}
      • <code>{{ h }}</code> - провайдеров: <code>{{ c }}</code><br>
      {% endfor %}<br>

      🧩 <b>Версии provider git hash</b><br>
      {% for h, c in stats.provider_git_hashes|dictsort(by='value', reverse=True) %}
      • <code>{{ h }}</code> - провайдеров: <code>{{ c }}</code><br>
      {% endfor %}
      <br>Запущен: <code>{{ stats.bot_started_at|datetimeformat }}</code> ({{ stats.bot_started_at|ago }})

  alert_settings:
    types_menu: |
      📢 <b>Выбор типов уведомлений</b><br><br>
      Выберите, о каких событиях вы хотите получать уведомления.

    thresholds_menu: |
      ⚙️ <b>Порог срабатывания уведомлений</b><br><br>
      Установите пороговые значения, при превышении которых будут отправляться уведомления.

    edit_threshold:
      title: |
        ⚙️ <b>Порог: {{ threshold_name }}</b><br><br>
      hint: |
        Текущее значение: <b>{{ threshold_value }}%</b><br>
        Задайте необходимый порог кнопками ниже.

  language:
    menu: |
      🌐 <b>Выбор языка</b><br><br>
      Установите язык интерфейса, который вам удобнее.

  help:
    menu: |
      ℹ️ <b>О боте</b><br><br>
      Бот помогает отслеживать статус провайдеров,
      получать уведомления и управлять подписками.

  provider:
    menu: |
      {{ provider.ui.status_emoji }} <b>Провайдер</b> <code>{{ provider.ui.short_pubkey }}</code><br><br>
      <b>• Статус</b>: <code>{{ provider.ui.status_text }} ({{ provider.ui.uptime }})</code><br>
      <b>• Последний онлайн</b>: <code>{{ provider.last_online_check_time | ago }}</code><br>
      <b>• Рейтинг</b>: <code>{{ provider.ui.rating }}</code><br>
      <b>• Цена</b>: <code>{{ provider.ui.price }}</code><br>
      <b>• Адрес</b>: <a href="https://tonviewer.com/{{ provider.address }}">{{ provider.ui.short_address }}</a><br>
      <b>• В работе</b>: <code>{{ provider.working_time | durationformat }}</code><br>
      <b>• Расположение</b>: <code>{{ provider.ui.location }}</code><br>
      <b>• Git-хеш хранилища:</b> <code>{{ provider.ui.storage_git_hash }}</code><br>
      <b>• Git-хеш провайдера:</b> <code>{{ provider.ui.provider_git_hash }}</code><br>
      <b>• Дата регистрации:</b> <code>{{ provider.reg_time | datetimeformat }}</code><br>

    enter_password: |
      🔐 <b>Введите пароль</b><br><br>
      Чтобы оформить подписку на провайдера, отправьте пароль.<br><br>
      <blockquote>
      Задать пароль можно в консоли mytonprovider с помощью команды:<br>
      <code>telemetry_pass &lt;пароль&gt;</code>
      </blockquote>

    incorrect_password: |
      ❗️ <b>Неверный пароль</b><br><br>
      Проверьте ввод и попробуйте ещё раз.

    password_invalid: |
      <h3>⚠️ Пароль изменён</h3>
      Доступ к расширенным данным закрыт. Обновите пароль, чтобы восстановить доступ.

    wallet: |
      <h2>Кошелёк</h2>
      <blockquote>
      <b>• Баланс:</b> <code>{{ provider_wallet_metrics.get('balance') | toamount }} TON</code><br>
      <b>• Заработано сегодня:</b> <code>{{ provider_wallet_metrics.get('earned_today') | toamount }} TON</code><br>
      <b>• Заработано за 7 дней:</b> <code>{{ provider_wallet_metrics.get('earned_week') | toamount }} TON</code><br>
      <b>• Заработано за 30 дней:</b> <code>{{ provider_wallet_metrics.get('earned_month') | toamount }} TON</code><br>
      <b>• Всего заработано:</b> <code>{{ provider_wallet_metrics.get('earned_total') | toamount }} TON</code><br>
      <b>• Обновлено:</b> <code>{{ provider_wallet_metrics.get('updated_at') | datetimeformat }}</code><br>
      </blockquote>

    storage: |
      <h2>Хранилище</h2>
      <blockquote>
      <b>• Макс. размер bag’а:</b> <code>{{ provider.ui.max_bag_size }}</code><br>
      <b>• Макс. срок хранения:</b> <code>{{ provider.max_span | durationformat }}</code><br>
      <b>• Мин. срок хранения:</b> <code>{{ provider.min_span | durationformat }}</code><br>
      <b>• Использовано место:</b><br>
      {% set m = provider_storage_metrics %}
      {% set rows = [
        ("Сегодня", "used_today"),
        ("За 7 дней", "used_week"),
        ("За 30 дней", "used_month"),
        ("Всего", "used_total"),
      ] %}
      <b>&nbsp;&nbspФормат: (использовано / занято / всего)</b><br>
      {% for label, k in rows -%}
        {% set used_delta_bytes = ((m.get(k) or 0.0) * 1_000_000_000) %}
        {% set used_eom_bytes = ((m.get('used_provider_space') or 0.0) * 1_000_000_000) %}
        {% set total_eom_bytes = ((m.get('total_provider_space') or 0.0) * 1_000_000_000) %}
        <b>&nbsp;&nbsp;&nbsp;• {{ label }}:</b>
        <code>{{ used_delta_bytes | sizeformat }}</code>
        / <code>{{ used_eom_bytes | sizeformat }}</code>
        / <code>{{ total_eom_bytes | sizeformat }}</code><br>
      {%- endfor %}
      <b>&nbsp;&nbsp;&nbsp;• Обновлено:</b> <code>{{ m.get('updated_at') | datetimeformat }}</code><br>
      </blockquote>

    hardware: |
      <h2>Железо</h2>
      <blockquote>
      <b>• CPU:</b> <code>{{ provider.ui.cpu_name }}</code><br>
      <b>• Количество ядер:</b> <code>{{ provider.ui.cpu_number }}</code><br>
      <b>• Виртуальный CPU:</b> <code>{{ provider.ui.cpu_is_virtual }}</code><br>
      <b>• RAM:</b> <code>{{ provider.ui.ram }}</code><br>
      <b>• Объём хранилища:</b> <code>{{ provider.ui.storage }}</code><br>
      </blockquote>

    benchmarks: |
      <h2>Бенчмарки</h2>
      <blockquote>
      <b>• Чтение диска:</b> <code>{{ provider.ui.disk_read_speed }}</code><br>
      <b>• Запись диска:</b> <code>{{ provider.ui.disk_write_speed }}</code><br>
      </blockquote>

    network: |
      <h2>Сеть</h2>
      <blockquote>
      <b>• Загрузка:</b> <code>{{ provider.ui.speed_download }}</code><br>
      <b>• Отправка:</b> <code>{{ provider.ui.speed_upload }}</code><br>
      <b>• Пинг:</b> <code>{{ provider.ui.ping }}</code><br>
      <b>• Страна:</b> <code>{{ provider.ui.country }}</code><br>
      <b>• Провайдер:</b> <code>{{ provider.ui.isp }}</code><br>
      </blockquote>

    traffic: |
      <h2>Трафик</h2>
      {% set m = provider_traffic_metrics %}
      {% set rows = [
        ("Сегодня", "traffic_today_in","traffic_today_out","traffic_today_total"),
        ("За 7 дней", "traffic_week_in","traffic_week_out","traffic_week_total"),
        ("За 30 дней", "traffic_month_in","traffic_month_out","traffic_month_total"),
        ("Всего", "traffic_total_in","traffic_total_out","traffic_total"),
      ] %}
      <blockquote>
      <b>Формат: (вход / выход / всего)</b><br>
      {% for label, i, o, t in rows -%}
        {% set total = (m.get(t) if t else ((m.get(i) or 0) + (m.get(o) or 0))) %}
        <b>• {{ label }}:</b>
        <code>{{ (m.get(i) or 0) | sizeformat }}</code> / <code>{{ (m.get(o) or 0) | sizeformat }}</code> / <code>{{ total | sizeformat }}</code><br>
      {%- endfor %}
      <b>• Обновлено:</b> <code>{{ m.get('updated_at') | datetimeformat }}</code><br>
      </blockquote>

    last_month_report: |
      <h2>Отчет за прошлый месяц</h2>
      <blockquote>
      <b>• Заработано:</b> <code>+{{ provider_last_month_report.earned_nanoton | toamount }} TON</code><br>
      <b>• Использовано места:</b> <code>+{{ provider_last_month_report.used_space_bytes | sizeformat }}</code><br>
      <b>• Использовано трафика:</b> <code>↓ {{ provider_last_month_report.traffic_in_bytes | sizeformat }}</code> / <code>↑ {{ provider_last_month_report.traffic_out_bytes | sizeformat }}</code><br>
      <b>• Период:</b> <code>{{ provider_last_month_report.start_date }}</code> • <code>{{ provider_last_month_report.end_date }}</code><br><br>
      </blockquote>

    bags: |
      <br>📦 <b>Хранимые bags</b>: <code>{{ checked_count }}</code><br>
      <b>• Доступны</b>: <code>{{ ok_count }}</code><br>
      {%- if problematic_count > 0 %}
      <b>• Проблемные</b>: <code>{{ problematic_count }}</code><br>
      {%- endif %}
      {%- if checked_count == 0 %}<br>
      <blockquote>Контракты ещё не найдены. Данные появятся после следующей синхронизации.</blockquote>
      {%- endif %}

    bags_detail: |
      📋 <b>Контракт</b><br><br>
      <b>• Статус</b>: <code>{{ reason_text }}</code><br>
      <b>• Размер</b>: <code>{{ contract.size | sizeformat }}</code><br>
      {%- if contract.reason_timestamp %}
      <b>• Проверено</b>: <code>{{ contract.reason_timestamp | datetimeformat }}</code><br>
      {%- endif %}<br>
      <b>• Bag ID</b>: <a href="https://mytonstorage.org/api/v1/gateway/{{ contract.bag_id }}">{{ contract.bag_id[:5] }}...{{ contract.bag_id[-6:] }}</a><br>
      <b>• Контракт</b>: <a href="https://tonviewer.com/{{ contract.address }}">{{ contract.address[:5] }}...{{ contract.address[-6:] }}</a><br>
      <b>• Владелец</b>: <a href="https://tonviewer.com/{{ contract.owner_address }}">{{ contract.owner_address[:5] }}...{{ contract.owner_address[-6:] }}</a><br>

alerts:
  monthly_report:
    info: |
      📊 <b>Ежемесячный отчёт</b><br><br>
      <b>Провайдер:</b><br>
      <code>{{ provider.pubkey }}</code><br>
      <b>Период:</b> <code>{{ report.start_date }}</code> • <code>{{ report.end_date }}</code><br><br>
      
      <b>• Заработано:</b> <code>+{{ report.earned_nanoton | toamount }} TON</code><br>
      <b>• Использовано места:</b> <code>+{{ report.used_space_bytes | sizeformat }}</code><br>
      <b>• Использовано трафика:</b> <code>↓ {{ report.traffic_in_bytes | sizeformat }}</code> / <code>↑ {{ report.traffic_out_bytes | sizeformat }}</code><br>

  service_restarted:
    detected: |
      ⚠️️ <b>Сервис {{ service_name }} перезапущен</b><br><br>
      <b>Провайдер:</b><br>
      <code>{{ provider.pubkey }}</code><br>

  cpu_high:
    detected: |
      ❗️ <b>CPU | Обнаружена повышенная нагрузка</b><br><br>
      <b>Провайдер:</b><br>
      <code>{{ provider.pubkey }}</code><br>
    resolved: |
      🔰 <b>CPU | Нагрузка нормализована</b><br><br>
      <b>Провайдер:</b><br>
      <code>{{ provider.pubkey }}</code><br>

  ram_high:
    detected: |
      ❗️ <b>RAM | Обнаружена повышенная нагрузка</b><br><br>
      <b>Провайдер:</b><br>
      <code>{{ provider.pubkey }}</code><br>
    resolved: |
      🔰 <b>RAM | Нагрузка нормализована</b><br><br>
      <b>Провайдер:</b><br>
      <code>{{ provider.pubkey }}</code><br>

  disk_load_high:
    detected: |
      ❗️ <b>Диск | Обнаружена повышенная нагрузка</b><br><br>
      <b>Провайдер:</b><br>
      <code>{{ provider.pubkey }}</code><br>
    resolved: |
      🔰 <b>Диск | Нагрузка нормализована</b><br><br>
      <b>Провайдер:</b><br>
      <code>{{ provider.pubkey }}</code><br>

  network_high:
    detected: |
      ❗️ <b>Сеть | Обнаружена повышенная нагрузка</b><br><br>
      <b>Провайдер:</b><br>
      <code>{{ provider.pubkey }}</code><br>
    resolved: |
      🔰 <b>Сеть | Нагрузка нормализована</b><br><br>
      <b>Провайдер:</b><br>
      <code>{{ provider.pubkey }}</code><br>

  disk_space_low:
    detected: |
      ❗️ <b>Диск | Доступное место почти закончилось</b><br><br>
      <b>Провайдер:</b><br>
      <code>{{ provider.pubkey }}</code><br>
    resolved: |
      🔰 <b>Диск | Доступное место восстановлено</b><br><br>
      <b>Провайдер:</b><br>
      <code>{{ provider.pubkey }}</code><br>

  provider_offline:
    detected: |
      ❗️ <b>Сервер провайдера не отвечает</b><br><br>
      <b>Провайдер:</b><br>
      <code>{{ provider.pubkey }}</code><br>
    resolved: |
      🔰 <b>Сервер провайдера восстановил работу</b><br><br>
      <b>Провайдер:</b><br>
      <code>{{ provider.pubkey }}</code><br>

  bags_changed:
    detected: |
      📦 <b>Изменения Bags</b><br><br>
      <b>Провайдер:</b><br>
      <code>{{ provider.pubkey }}</code><br>
      {%- if added_count %}
      <br><b>Добавлено ({{ added_count }}):</b><br>
      {%- for bag in added_list %}
      • <a href="https://mytonstorage.org/api/v1/gateway/{{ bag }}">{{ bag[:10] }}...{{ bag[-10:] }}</a><br>
      {%- endfor %}
      {%- if added_count > added_list|length %}
      <i>...и ещё {{ added_count - added_list|length }}</i><br>
      {%- endif %}
      {%- endif %}
      {%- if removed_count %}
      <br><b>Удалено ({{ removed_count }}):</b><br>
      {%- for bag in removed_list %}
      • <a href="https://mytonstorage.org/api/v1/gateway/{{ bag }}">{{ bag[:10] }}...{{ bag[-10:] }}</a><br>
      {%- endfor %}
      {%- if removed_count > removed_list|length %}
      <i>...и ещё {{ removed_count - removed_list|length }}</i><br>
      {%- endif %}
      {%- endif %}
    info: |
      📦 <b>Изменения Bags</b><br><br>
      <b>Провайдер:</b><br>
      <code>{{ provider.pubkey }}</code><br>
      {%- if failed_count %}
      <br><b>Обнаружены проблемы ({{ failed_count }}):</b><br>
      {%- for bag_id in failed_list %}
      • <a href="https://mytonstorage.org/api/v1/gateway/{{ bag_id }}">{{ bag_id[:10] }}...{{ bag_id[-10:] }}</a><br>
      {%- endfor %}
      {%- if failed_count > failed_list|length %}
      <i>...и ещё {{ failed_count - failed_list|length }}</i><br>
      {%- endif %}
      {%- endif %}
      {%- if recovered_count %}
      <br><b>Снова доступны ({{ recovered_count }}):</b><br>
      {%- for bag_id in recovered_list %}
      • <a href="https://mytonstorage.org/api/v1/gateway/{{ bag_id }}">{{ bag_id[:10] }}...{{ bag_id[-10:] }}</a><br>
      {%- endfor %}
      {%- if recovered_count > recovered_list|length %}
      <i>...и ещё {{ recovered_count - recovered_list|length }}</i><br>
      {%- endif %}
      {%- endif %}

